name: Pages preview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-preview
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run local quality gate
        run: npm run check
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:e2e
      - name: Run PWA offline and update tests
        run: npm run test:pwa
      - name: Build Pages artifact
        run: npm run build
        env:
          WWIIRUN_BASE_PATH: /WWIIRun/
          WWIIRUN_BUILD_ID: ${{ github.sha }}
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload exact Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
